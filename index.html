<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>專題進度管理工具</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏸%3C/text%3E%3C/svg%3E">
<style>
:root {
  --bg:      #f6f8fa;
  --panel:   #ffffff;
  --card:    #f6f8fa;
  --border:  #d0d7de;
  --border2: #e8ecef;
  --accent:  #0969da;
  --green:   #1a7f37;
  --orange:  #9a6700;
  --gray:    #8c959f;
  --red:     #cf222e;
  --text:    #24292f;
  --text2:   #57606a;
  --text3:   #8c959f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px; line-height: 1.5;
  min-height: 100vh;
  zoom: 1.5625;     /* 1.25 × 1.25 = 1.5625 */
}

/* ── Header ── */
.site-header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center;
}
.hdr-spacer { flex: 1; }
.hdr-center { flex: 2; text-align: center; }
.hdr-center h1 {
  font-size: 20px; font-weight: 700; color: var(--text);
  letter-spacing: -.3px;
}
.hdr-center p { font-size: 12px; color: var(--text3); margin-top: 4px; }
.hdr-right {
  flex: 1; display: flex; flex-direction: column;
  align-items: flex-end; gap: 6px;
}
.hdr-pct {
  font-size: 13px; font-weight: 700; color: var(--green);
  background: #dafbe1; border: 1px solid #aef0b5;
  border-radius: 20px; padding: 3px 12px;
}
.layout-btn {
  padding: 4px 12px; border: 1px solid var(--border);
  border-radius: 6px; background: white; color: var(--text2);
  font-size: 12px; cursor: pointer; white-space: nowrap;
}
.layout-btn:hover { background: var(--card); }
.layout-btn.active {
  background: #fff3cd; border-color: #ffc107;
  color: #7c5c00; font-weight: 600;
}
#sync-btn:disabled { opacity: .65; cursor: default; }

/* ── Layout ── */
.wrap { max-width: 900px; margin: 0 auto; padding: 20px 16px; }

/* ── 日期 / 里程碑面板 ── */
.info-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 16px;
}
.info-top { display: flex; gap: 0; margin-bottom: 14px; }
.info-col { flex: 1; padding-right: 24px; }
.info-col:last-child { padding-right: 0; border-right: none; }
.info-col + .info-col { padding-left: 24px; border-left: 1px solid var(--border2); }
.info-label { font-size: 10px; font-weight: 700; letter-spacing: .7px;
              text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
.info-date  { font-size: 17px; font-weight: 700; color: var(--text); }
.info-sub   { font-size: 12px; color: var(--text2); margin-top: 2px; }
.info-countdown { font-size: 12px; font-weight: 600; }
.info-countdown.soon   { color: var(--orange); }
.info-countdown.urgent { color: var(--red); }
.info-countdown.done   { color: var(--text3); }
.info-countdown.ok     { color: var(--accent); }

/* ── 里程碑卡片（新排版） ── */
.milestone-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding-top: 14px;
  border-top: 1px solid var(--border2);
}
.milestone {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
}
.milestone.next { background: #ddf4ff; border-color: #54aeff; }
.milestone.past { opacity: .55; }

/* 第一行：標題（最大） */
.ms-title {
  font-size: 15px; font-weight: 700; color: var(--text);
  margin-bottom: 8px; line-height: 1.2;
}
.ms-title.ok     { color: var(--accent); }
.ms-title.soon   { color: var(--orange); }
.ms-title.urgent { color: var(--red); }
.milestone.next .ms-cd { color: var(--accent); }

/* 第二三行：日期/時間/週次、地點 */
.ms-meta {
  font-size: 11px; color: var(--text2);
  margin-top: 3px; line-height: 1.6;
}

/* 第四行：倒數 */
.ms-cd {
  font-size: 11px; font-weight: 600; margin-top: 5px;
}
.ms-cd.ok     { color: var(--accent); }
.ms-cd.soon   { color: var(--orange); }
.ms-cd.urgent { color: var(--red); }
.ms-cd.done   { color: var(--text3); }

/* ── 總進度卡 ── */
.summary {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 22px;
  display: flex; align-items: center; gap: 24px;
}
.circ-wrap { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
.circ-wrap svg { transform: rotate(-90deg); }
.c-bg   { fill: none; stroke: #eaeef2; stroke-width: 9; }
.c-fill { fill: none; stroke: #1a7f37; stroke-width: 9;
          stroke-linecap: round; transition: stroke-dashoffset .7s; }
.circ-pct {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: var(--green);
}
.stats h3  { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.stat-row  { display: flex; gap: 20px; }
.stat      { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); }
.stat-n    { font-size: 18px; font-weight: 700; }
.stat-n.d  { color: var(--green); }
.stat-n.p  { color: var(--accent); }
.stat-n.t  { color: var(--gray); }

/* ── Reorderable 外層 ── */
.reorderable { margin-bottom: 8px; }
#section-summary { margin-bottom: 16px; }

/* ── 排版模式工具列 ── */
.layout-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 14px; margin-bottom: 6px;
  background: #fff8e1; border: 1px dashed #ffc107;
  border-radius: 8px; font-size: 12px;
}
.layout-label { color: #7c5c00; font-weight: 700; }
.layout-btns  { display: flex; gap: 6px; }
.move-btn {
  padding: 3px 11px; border: 1px solid #ffc107;
  border-radius: 4px; background: white; color: #7c5c00;
  font-size: 12px; cursor: pointer;
}
.move-btn:hover { background: #ffc107; }

/* ── Phase 卡片 ── */
.phase {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
}
.ph-head {
  padding: 12px 16px;
  display: flex; align-items: center; gap: 11px;
  cursor: pointer; user-select: none;
}
.ph-head:hover { background: #f0f3f6; }
.ph-badge {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.ph-badge.d { background: #dafbe1; color: #1a7f37; border: 1px solid #aef0b5; }
.ph-badge.p { background: #ddf4ff; color: #0969da; border: 1px solid #54aeff; }
.ph-badge.t { background: #f6f8fa; color: #8c959f; border: 1px solid #d0d7de; }
.ph-info  { flex: 1; }
.ph-title { font-size: 13px; font-weight: 600; color: var(--text); }
.ph-sub   { font-size: 11px; color: var(--text3); margin-top: 1px; }
.ph-pct   { font-size: 12px; font-weight: 600; color: var(--text2); }
.ph-chevron { color: var(--text3); font-size: 11px; margin-left: 4px; transition: transform .18s; }
.phase.collapsed .ph-chevron { transform: rotate(-90deg); }
.ph-bar { height: 3px; background: #eaeef2; }
.ph-bar-fill { height: 100%; transition: width .4s; }
.ph-body { padding: 4px 16px 12px; }
.phase.collapsed .ph-body { display: none; }

/* ── Section 標籤 ── */
.sec-lbl {
  font-size: 10px; font-weight: 700; letter-spacing: .7px;
  text-transform: uppercase; color: var(--text3);
  padding: 10px 8px 3px;
}

/* ── 任務列（唯讀） ── */
.task {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 4px 8px; border-radius: 5px;
}
.task.sub  { padding-left: 22px; }
.task-icon { flex-shrink: 0; width: 16px; font-size: 13px; margin-top: 1px; text-align: center; }
.task-text { font-size: 13px; line-height: 1.5; }
.task[data-s="✅"] .task-text { color: #8c959f; text-decoration: line-through; }
.task[data-s="⏳"] .task-text { color: var(--text); font-weight: 500; }
.task[data-s="x"]  .task-text { color: var(--text2); }
.task[data-s="✅"] .task-icon { color: #1a7f37; }
.task[data-s="⏳"] .task-icon { color: #9a6700; }
.task[data-s="x"]  .task-icon { color: #c8d0d9; }

/* ── 通用 Section Panel ── */
.section-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.section-head {
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.section-head:hover { background: #f0f3f6; }
.section-title   { font-size: 13px; font-weight: 600; color: var(--text); }
.section-chevron { color: var(--text3); font-size: 11px; transition: transform .18s; }
.section-panel.collapsed .section-chevron { transform: rotate(-90deg); }
.section-panel.collapsed .section-body   { display: none; }
.section-body { padding: 4px 16px 14px; }

/* ── 待辦事項 ── */
.input-row {
  display: flex; gap: 8px; margin-bottom: 10px; margin-top: 6px;
}
.input-row input {
  flex: 1; padding: 7px 10px;
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; font-family: inherit; outline: none;
  background: var(--panel);
}
.input-row input:focus { border-color: var(--accent); }
.btn-add {
  padding: 7px 14px; border: none; border-radius: 6px;
  background: var(--accent); color: white;
  font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
.btn-add:hover { background: #0860ca; }
.todo-list { list-style: none; }
.todo-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px; border-radius: 5px;
}
.todo-item:hover { background: var(--card); }
.todo-item input[type="checkbox"] { cursor: pointer; width: 15px; height: 15px; flex-shrink: 0; }
.todo-text { flex: 1; font-size: 13px; }
.todo-item.done .todo-text { color: var(--text3); text-decoration: line-through; }
.btn-del {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 13px; padding: 2px 5px;
  border-radius: 4px; line-height: 1; flex-shrink: 0;
}
.btn-del:hover { background: #ffd7d5; color: var(--red); }
.btn-edit {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 12px; padding: 2px 5px;
  border-radius: 4px; line-height: 1; flex-shrink: 0;
}
.btn-edit:hover { background: #ddf4ff; color: var(--accent); }
.todo-editing { flex-wrap: wrap; gap: 6px !important; }
.todo-edit-text {
  flex: 1; min-width: 120px; padding: 4px 8px;
  border: 1px solid var(--border); border-radius: 5px;
  font-size: 13px; font-family: inherit; outline: none;
}
.todo-edit-text:focus { border-color: var(--accent); }
.empty-hint { color: var(--text3); font-size: 13px; padding: 6px 8px; }
.todo-date-in { width: 130px; flex: none !important; padding: 7px 8px !important; }
.todo-time-in { width:  78px; flex: none !important; padding: 7px 8px !important; }
.todo-deadline {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  font-weight: 600; flex-shrink: 0; white-space: nowrap;
}
.todo-deadline.overdue { background: #ffd7d5; color: var(--red); }
.todo-deadline.urgent  { background: #fff3cd; color: var(--orange); }
.todo-deadline.ok      { background: #ddf4ff; color: var(--accent); }

/* ── 重要連結 ── */
.link-name-in { width: 150px !important; flex: none !important; }
.link-list { display: flex; flex-direction: column; gap: 2px; }
.link-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px; border-radius: 5px;
}
.link-item:hover { background: var(--card); }
.link-item a {
  font-size: 13px; font-weight: 500; color: var(--accent);
  text-decoration: none; flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.link-item a:hover { text-decoration: underline; }
.link-url-text {
  font-size: 11px; color: var(--text3); flex-shrink: 0;
  max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── 筆記 ── */
.notes-grid {
  display: grid; grid-template-columns: 1fr;
  gap: 8px; margin-top: 6px;
}
.notes-section-label {
  grid-column: 1 / -1;
  font-size: 10px; font-weight: 700; letter-spacing: .5px;
  text-transform: uppercase; color: var(--text3);
  padding: 10px 0 4px; border-top: 1px solid var(--border2); margin-top: 4px;
}
.notes-section-label:first-child { border-top: none; margin-top: 0; padding-top: 2px; }
.note-card {
  border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
}
.note-card.current { border-color: var(--accent); box-shadow: 0 0 0 2px #0969da22; }
.note-card-head {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; cursor: pointer; user-select: none;
  background: var(--card);
}
.note-card-head:hover { background: #f0f3f6; }
.note-card.current .note-card-head { background: #ddf4ff; }
.note-card-title { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }
.note-card-badge {
  font-size: 9px; color: white; background: var(--accent);
  border-radius: 3px; padding: 1px 5px; font-weight: 700; flex-shrink: 0;
}
.note-card-chevron { color: var(--text3); font-size: 10px; transition: transform .18s; flex-shrink: 0; }
.note-card.expanded .note-card-chevron { transform: rotate(180deg); }
.note-card-body { display: none; }
.note-card.expanded .note-card-body { display: block; }
.note-area {
  width: 100%; min-height: 110px; padding: 10px 12px;
  border: none; border-top: 1px solid var(--border2);
  resize: vertical; font-size: 13px;
  font-family: inherit; background: white;
  outline: none; line-height: 1.6;
}
.note-area:focus { background: #fffef5; }

/* ── 筆記子欄位 ── */
.subnote-item {
  border-top: 1px solid var(--border2);
  overflow: hidden;
}
.subnote-item:first-child { border-top: none; }
.subnote-head {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; cursor: pointer;
  background: var(--card);
}
.subnote-head:hover { background: #f0f3f6; }
.subnote-name { font-size: 12px; font-weight: 600; color: var(--text2); flex: 1; }
.subnote-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 12px; padding: 2px 5px; border-radius: 4px; }
.subnote-del:hover { background: #ffd7d5; color: var(--red); }
.subnote-chevron { color: var(--text3); font-size: 10px; transition: transform .18s; }
.subnote-item.expanded .subnote-chevron { transform: rotate(180deg); }
.subnote-body { display: none; }
.subnote-item.expanded .subnote-body { display: block; }
.add-subnote-btn {
  display: block; width: 100%; padding: 6px 12px;
  border: none; border-top: 1px dashed var(--border2);
  background: transparent; color: var(--accent);
  font-size: 12px; font-weight: 600; cursor: pointer; text-align: left;
}
.add-subnote-btn:hover { background: #ddf4ff; }

/* 手機專用元素（桌機隱藏） */
.mobile-only { display: none; }
/* 手機版短標題（預設隱藏，手機才顯示） */
.title-short { display: none; }

/* ── 觸控裝置（iPad / 平板，寬 ≥ 601px）── */
/* 用明確的 font-size 覆寫取代 zoom（Safari 的 zoom 只縮版面，不縮字體）*/
@media (pointer: coarse) and (min-width: 601px) {
  .mobile-only { display: inline-flex; }

  /* 基礎：body 14px → 20px（×1.4） */
  body { font-size: 20px; }

  /* Header */
  .hdr-center h1  { font-size: 28px; }
  .hdr-center p   { font-size: 17px; }
  .hdr-pct        { font-size: 18px; }
  .layout-btn     { font-size: 17px; }

  /* 日期資訊面板 */
  .info-label     { font-size: 14px; }
  .info-date      { font-size: 24px; }
  .info-sub, .info-countdown { font-size: 17px; }

  /* 里程碑 */
  .ms-title { font-size: 21px; }
  .ms-meta, .ms-cd { font-size: 15px; }

  /* 總進度圓環 */
  .circ-pct { font-size: 21px; }
  .stats h3 { font-size: 20px; }
  .stat     { font-size: 18px; }
  .stat-n   { font-size: 25px; }

  /* Phase 卡片 */
  .ph-badge   { font-size: 15px; }
  .ph-title   { font-size: 18px; }
  .ph-sub     { font-size: 15px; }
  .ph-pct     { font-size: 17px; }
  .ph-chevron { font-size: 15px; }
  .sec-lbl    { font-size: 14px; }

  /* 任務列 */
  .task-icon, .task-text { font-size: 18px; }

  /* Section 通用面板 */
  .section-title, .section-chevron { font-size: 18px; }

  /* 待辦（加 !important 覆寫 .input-row input 等高優先度選擇器） */
  input, textarea, select { font-size: 18px !important; }
  .btn-add        { font-size: 18px; }
  .todo-text      { font-size: 18px; }
  .btn-del        { font-size: 18px; }
  .btn-edit       { font-size: 17px; }
  .empty-hint     { font-size: 18px; }
  .todo-deadline  { font-size: 15px; }  /* 原本誤寫成 .due-badge */

  /* 重要連結（原本誤寫成 .link-name，實際元素是 .link-item a） */
  .link-item a    { font-size: 18px; }
  .link-url-text  { font-size: 15px; }

  /* 筆記 */
  .notes-section-label { font-size: 14px; }  /* 原本漏掉：「週次Meeting筆記」等分類標題 */
  .note-card-title     { font-size: 17px; }
  .note-card-chevron   { font-size: 14px; }
  .note-area           { font-size: 18px !important; }  /* 覆寫 .note-area 高優先度規則 */
  .subnote-name, .subnote-del, .add-subnote-btn { font-size: 17px; }
  .subnote-chevron     { font-size: 14px; }

  /* Footer */
  .footer { font-size: 15px; }
}

/* ── Footer ── */
.footer {
  text-align: center; font-size: 11px; color: var(--text3);
  padding: 20px 0 32px;
}

/* ── 手機版（≤ 600px） ── */
@media (max-width: 600px) {
  /* Header：垂直疊放 */
  .site-header {
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
    padding: 10px 14px;
  }
  .hdr-spacer { display: none; }
  .hdr-center { flex: none; text-align: center; padding-bottom: 6px; }
  .hdr-center h1 { font-size: 17px; }
  .hdr-center p  { font-size: 11px; }
  /* 手機版：換用短標題 */
  .title-full  { display: none; }
  .title-short { display: block; }
  .hdr-right {
    flex: none;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .hdr-pct { font-size: 12px; padding: 2px 10px; }
  .layout-btn { font-size: 11px; padding: 4px 8px; }

  /* 主內容左右間距收窄 */
  .wrap { padding: 12px 10px; }

  /* 日期資訊欄：左右並排兩格，各自獨立 */
  .info-top { flex-direction: row; gap: 0; }
  .info-col { flex: 1; padding-right: 12px !important; padding-left: 0 !important; border-left: none !important; }
  .info-col + .info-col { padding-left: 12px !important; padding-right: 0 !important; border-left: 1px solid var(--border2) !important; }

  /* 預計完成日：倒數移到標籤右側 */
  .info-col:last-child { position: relative; }
  #deadline-cd { position: absolute; top: 0; right: 0; font-size: 11px; }

  /* 里程碑：4欄 → 1欄（逐條顯示） */
  .milestone-row { grid-template-columns: 1fr; gap: 8px; }

  /* 里程碑卡片：倒數移到右上角 */
  .milestone { position: relative; padding-right: 90px; }
  .ms-cd { position: absolute; top: 12px; right: 14px; text-align: right; }

  /* 手機專用按鈕（刷新）顯示 */
  .mobile-only { display: inline-flex; }

  /* 總進度卡：水平 → 垂直 */

// ── 日期工具 ─────────────────────────────────────────
function today() {
  var d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
function fmt(d) {
  return d.getFullYear() + ' / ' +
    String(d.getMonth() + 1).padStart(2, '0') + ' / ' +
    String(d.getDate()).padStart(2, '0');
}
function diffDays(a, b) { return Math.round((b - a) / 86400000); }
function cdText(days) {
  if (days < 0)   return { text: '已過', cls: 'done' };
  if (days === 0) return { text: '就是今天！', cls: 'urgent' };
  if (days <= 7)  return { text: '還有 ' + days + ' 天', cls: 'urgent' };
  if (days <= 30) return { text: '還有 ' + days + ' 天', cls: 'soon' };
  return { text: '還有 ' + days + ' 天', cls: 'ok' };
}
function currentWeekNum() {
  var diff = diffDays(WEEK_ONE, today());
  return diff >= 0 ? Math.floor(diff / 7) + 1 : 1;
}

// ── 渲染日期面板 ─────────────────────────────────────
function renderDates() {
  var now  = today();
  var week = currentWeekNum();
  document.getElementById('today-date').textContent = fmt(now);
  document.getElementById('today-week').textContent = '第 ' + week + ' 週';

  var dlDays = diffDays(now, DEADLINE);
  var dlCd   = cdText(dlDays);
  var dlEl   = document.getElementById('deadline-cd');
  dlEl.textContent = dlCd.text;
  dlEl.className   = 'info-countdown ' + dlCd.cls;

  var nextIdx = -1;
  MILESTONES.forEach(function(m, i) {
    if (nextIdx < 0 && diffDays(now, new Date(m.date)) >= 0) nextIdx = i;
  });

  var row = document.getElementById('milestones');
  row.innerHTML = '';
  MILESTONES.forEach(function(m, i) {
    var md   = new Date(m.date);
    var days = diffDays(now, md);
    var past = days < 0;
    var next = (i === nextIdx);
    var cd   = cdText(days);

    var card = document.createElement('div');
    card.className = 'milestone' + (next ? ' next' : '') + (past ? ' past' : '');

    var dateStr = (md.getMonth() + 1) + '/' + md.getDate();

    // 新排版：第一行最大，二三四行同等大小
    card.innerHTML =
      '<div class="ms-title' + (next ? ' ' + cd.cls : '') + '">' + m.label + '</div>' +
      '<div class="ms-meta">&#x1F4C5; ' + dateStr + '&nbsp;&nbsp;' + m.sub + '&nbsp;&nbsp;第 ' + m.week + ' 週</div>' +
      '<div class="ms-meta">&#x1F4CD; ' + m.location + '</div>' +
      '<div class="ms-cd ' + cd.cls + '">' + cd.text + '</div>';

    row.appendChild(card);
  });
}

function loadLayout() {
  try {
    var saved = JSON.parse(localStorage.getItem(LAYOUT_KEY));
    if (Array.isArray(saved) && saved.length === SECTION_IDS.length &&
        SECTION_IDS.every(function(id) { return saved.indexOf(id) >= 0; })) {
      return saved;
    }
  } catch(e) {}
  return SECTION_IDS.slice();
}
function saveLayout() {
  var zone = document.getElementById('layout-zone');
  var order = [];
  Array.prototype.forEach.call(zone.children, function(el) {
    if (el.classList.contains('reorderable')) order.push(el.id);
  });
  localStorage.setItem(LAYOUT_KEY, JSON.stringify(order));
  markDirty();
}
function applyLayout() {
  var order = loadLayout();
  var zone  = document.getElementById('layout-zone');
  order.forEach(function(id) {
    var el = document.getElementById(id);
    if (el && el.parentElement === zone) zone.appendChild(el);
  });
}

function toggleLayout() {
  var btn    = document.getElementById('layout-btn');
  var active = btn.classList.contains('active');

  if (active) {
    // 結束排版模式
    btn.classList.remove('active');
    btn.textContent = '排版模式';
    document.querySelectorAll('.layout-toolbar').forEach(function(el) { el.remove(); });
    saveLayout();
  } else {
    // 進入排版模式
    btn.classList.add('active');
    btn.textContent = '完成排版';
    document.querySelectorAll('#layout-zone .reorderable').forEach(function(el) {
      var tb = document.createElement('div');
      tb.className = 'layout-toolbar';
      tb.innerHTML =
        '<span class="layout-label">' + (SECTION_LABELS[el.id] || el.id) + '</span>' +
        '<div class="layout-btns">' +
          '<button class="move-btn" data-id="' + el.id + '" data-dir="-1">↑ 上移</button>' +
          '<button class="move-btn" data-id="' + el.id + '" data-dir="1">↓ 下移</button>' +
        '</div>';
      el.insertBefore(tb, el.firstChild);
    });
    document.querySelectorAll('.move-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        moveSection(this.dataset.id, parseInt(this.dataset.dir));
      });
    });
  }
}

function moveSection(id, dir) {
  var zone = document.getElementById('layout-zone');
  var el   = document.getElementById(id);
  if (!el) return;
  if (dir === -1) {
    var prev = el.previousElementSibling;
    if (prev && prev.classList.contains('reorderable')) zone.insertBefore(el, prev);
  } else {
    var next = el.nextElementSibling;
    if (next && next.classList.contains('reorderable')) zone.insertBefore(next, el);
  }
}

// 資料載入（data.json → localStorage fallback）
// ════════════════════════════════════════════════════
async function loadData() {
  // file:// 模式（本機開發）：localStorage 有資料就不覆蓋
  if (location.protocol === 'file:') {
    var lt = JSON.parse(localStorage.getItem(S_TODOS) || '[]');
    var ll = JSON.parse(localStorage.getItem(S_LINKS) || '[]');
    if (lt.length > 0 || ll.length > 0) return;
  }
  // https:// 模式（GitHub Pages）：每次都從 GitHub 抓最新，強制跳過 CDN 快取
  try {
    var url  = './data.json?t=' + Date.now();
    var resp = await fetch(url, { cache: 'no-store' });
    if (resp.ok) {
      var d = await resp.json();
      if (Array.isArray(d.todos))
        localStorage.setItem(S_TODOS, JSON.stringify(d.todos));
      if (Array.isArray(d.links))
        localStorage.setItem(S_LINKS, JSON.stringify(d.links));
      if (d.notes && typeof d.notes === 'object')
        localStorage.setItem(S_NOTES, JSON.stringify(d.notes));
      if (Array.isArray(d.layout))
        localStorage.setItem(LAYOUT_KEY, JSON.stringify(d.layout));
    }
  } catch(e) {}
}

// GitHub 同步
// ════════════════════════════════════════════════════
function getToken()  { return localStorage.getItem(S_TOKEN) || ''; }
function setToken(t) { localStorage.setItem(S_TOKEN, t); }

async function syncToGitHub() {
  var token = getToken();
  if (!token) {
    var t = prompt('請輸入你的 GitHub Personal Access Token：\n（之後會儲存在此裝置，不需要再輸入）');
    if (!t || !t.trim()) return;
    setToken(t.trim());
    token = t.trim();
  }

  var data = {
    todos:  JSON.parse(localStorage.getItem(S_TODOS)    || '[]'),
    links:  JSON.parse(localStorage.getItem(S_LINKS)    || '[]'),
    notes:  JSON.parse(localStorage.getItem(S_NOTES)    || '{}'),
    layout: JSON.parse(localStorage.getItem(LAYOUT_KEY) || 'null') || SECTION_IDS.slice()
  };

  var content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  var apiUrl  = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + GH_FILE;
  var hdrs    = {
    'Authorization': 'token ' + token,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };

  // 先取得目前的 SHA（更新檔案時必須提供）
  var sha = null;
  try {
    var g = await fetch(apiUrl, { headers: hdrs });
    if (g.ok) sha = (await g.json()).sha;
  } catch(e) {}

  var syncBtn = document.getElementById('sync-btn');
  syncBtn.textContent = '同步中...';
  syncBtn.disabled = true;

  try {
    var body = {
      message: '更新進度資料 ' + new Date().toLocaleString('zh-TW'),
      content: content
    };
    if (sha) body.sha = sha;

    var r = await fetch(apiUrl, { method: 'PUT', headers: hdrs, body: JSON.stringify(body) });
    if (r.ok) {
      markClean();
      var tsNow = new Date();
      var tsStr = tsNow.getFullYear() + '/' +
        String(tsNow.getMonth()+1).padStart(2,'0') + '/' +
        String(tsNow.getDate()).padStart(2,'0') + ' ' +
        String(tsNow.getHours()).padStart(2,'0') + ':' +
        String(tsNow.getMinutes()).padStart(2,'0');
      localStorage.setItem('ccep_last_sync', tsStr);
      var ftEl = document.getElementById('footer-ts');
      if (ftEl) ftEl.textContent = '最後同步：' + tsStr;
      syncBtn.textContent = '✓ 已同步！';
      setTimeout(function() {
        syncBtn.textContent = '同步到 GitHub';
        syncBtn.disabled = false;
      }, 3000);
    } else {
      var err = await r.json();
      if (r.status === 401) {
        alert('Token 無效或已過期，請重新設定。');
        localStorage.removeItem(S_TOKEN);
      } else {
        alert('同步失敗：' + (err.message || r.status));
      }
      syncBtn.textContent = '同步到 GitHub';
      syncBtn.disabled = false;
    }
  } catch(e) {
    alert('網路錯誤：' + e.message);
    syncBtn.textContent = '同步到 GitHub';
    syncBtn.disabled = false;
  }
}

function setupToken() {
  var cur = getToken();
  var msg = cur

    : '請輸入你的 GitHub Personal Access Token：';

}

function dlBadge(deadline) {
  if (!deadline) return null;
  var hasTime = deadline.indexOf('T') >= 0;
  var d       = new Date(hasTime ? deadline : deadline + 'T00:00:00');
  var now     = new Date();
  var dDay    = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  var days    = diffDays(today(), dDay);
  function hhmm(dt) {
    return String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0');
  }
  var cls, text;
  if (!hasTime) {
    // 純日期：以天為單位比較
    if      (days < 0)   { cls = 'overdue'; text = '已過期 ' + (d.getMonth()+1) + '/' + d.getDate(); }
    else if (days === 0) { cls = 'urgent';  text = '今天截止'; }
    else if (days <= 7)  { cls = 'urgent';  text = days + ' 天後'; }
    else                 { cls = 'ok';      text = (d.getMonth()+1) + '/' + d.getDate(); }
  } else {
    // 含時間：以精確時間比較
    if      (d < now)    { cls = 'overdue'; text = '已過期 ' + (d.getMonth()+1) + '/' + d.getDate(); }
    else if (days === 0) { cls = 'urgent';  text = '今天 ' + hhmm(d); }
    else if (days <= 7)  { cls = 'urgent';  text = days + '天後 ' + hhmm(d); }
    else                 { cls = 'ok';      text = (d.getMonth()+1) + '/' + d.getDate() + ' ' + hhmm(d); }
  }
  var sp = document.createElement('span');
  sp.className = 'todo-deadline ' + cls;
  sp.textContent = text;
  return sp;
}
function renderTodos() {
  var todos = loadTodos();
  var list  = document.getElementById('todo-list');
  list.innerHTML = '';
  if (todos.length === 0) {
    list.innerHTML = '<li class="empty-hint">還沒有待辦事項</li>';
    return;
  }
  todos.forEach(function(t, i) {
    var li = document.createElement('li');
    li.className = 'todo-item' + (t.done ? ' done' : '');

    var cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = t.done;
    (function(idx) { cb.addEventListener('change', function() {
      todos[idx].done = cb.checked; saveTodos(todos); renderTodos();
    }); })(i);

    var span = document.createElement('span');
    span.className = 'todo-text'; span.textContent = t.text;

    var badge = dlBadge(t.deadline || '');

    var btn = document.createElement('button');
    btn.className = 'btn-del'; btn.textContent = '✕';
    (function(idx) { btn.addEventListener('click', function() {
      todos.splice(idx, 1); saveTodos(todos); renderTodos();
    }); })(i);

    var editBtn = document.createElement('button');
    editBtn.className = 'btn-edit'; editBtn.title = '編輯';
    editBtn.textContent = '✏';
    (function(idx, li) {
      editBtn.addEventListener('click', function() {
        var t = todos[idx];
        var dateVal = '', timeVal = '';
        if (t.deadline && t.deadline.indexOf('T') >= 0) {
          var p = t.deadline.split('T'); dateVal = p[0]; timeVal = p[1] || '';
        } else if (t.deadline) { dateVal = t.deadline; }
        li.className = 'todo-item todo-editing';
        li.innerHTML = '';
        var textIn = document.createElement('input');
        textIn.type = 'text'; textIn.value = t.text; textIn.className = 'todo-edit-text';
        var dateIn = document.createElement('input');
        dateIn.type = 'date'; dateIn.value = dateVal; dateIn.className = 'todo-date-in';
        var timeIn = document.createElement('input');
        timeIn.type = 'text'; timeIn.value = timeVal;
        timeIn.className = 'todo-time-in'; timeIn.placeholder = 'HH:MM'; timeIn.maxLength = 5;
        var saveBtn = document.createElement('button');
        saveBtn.className = 'btn-add'; saveBtn.textContent = '儲存';
        saveBtn.addEventListener('click', function() {
          var newText = textIn.value.trim();
          if (!newText) { alert('名稱不能為空'); return; }
          var tv = timeIn.value.trim();
          var dl = '';
          if (dateIn.value && tv) dl = dateIn.value + 'T' + tv;
          else if (dateIn.value) dl = dateIn.value;
          todos[idx].text = newText;
          todos[idx].deadline = dl;
          saveTodos(todos); renderTodos();
        });
        var cancelBtn = document.createElement('button');
        cancelBtn.className = 'btn-del'; cancelBtn.textContent = '✕';
        cancelBtn.addEventListener('click', function() { renderTodos(); });
        li.appendChild(textIn); li.appendChild(dateIn); li.appendChild(timeIn);
        li.appendChild(saveBtn); li.appendChild(cancelBtn);
        textIn.focus();
      });
    })(i, li);

    li.appendChild(cb); li.appendChild(span);
    if (badge) li.appendChild(badge);
    li.appendChild(editBtn); li.appendChild(btn);
    list.appendChild(li);
  });
}
function addTodo() {
  var input   = document.getElementById('todo-input');
  var dateIn  = document.getElementById('todo-date');
  var timeIn  = document.getElementById('todo-time');
  var text    = input.value.trim();
  if (!text) return;
  var timeVal  = timeIn.value.trim();
  if (timeVal && !/^([01]?[0-9]|2[0-3]):[0-5][0-9]$/.test(timeVal)) {
    alert('時間格式錯誤，請輸入 HH:MM，例如 21:00');
    return;
  }
  var deadline = '';
  if (dateIn.value && timeVal) deadline = dateIn.value + 'T' + timeVal;
  else if (dateIn.value)       deadline = dateIn.value;
  var todos = loadTodos();
  todos.push({ text: text, done: false, deadline: deadline });
  saveTodos(todos);
  input.value  = '';
  dateIn.value = '';
  timeIn.value = '';
  renderTodos();
}
document.getElementById('todo-add').addEventListener('click', addTodo);
document.getElementById('todo-input').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') addTodo();
});

// ════════════════════════════════════════════════════
// 重要連結（localStorage: ccep_links）
// ════════════════════════════════════════════════════
var S_LINKS = 'ccep_links';
function loadLinks() {
  try { return JSON.parse(localStorage.getItem(S_LINKS) || '[]'); } catch(e) { return []; }
}
function saveLinks(arr) { localStorage.setItem(S_LINKS, JSON.stringify(arr)); markDirty(); }

function renderLinks() {
  var links = loadLinks();
  var list  = document.getElementById('link-list');
  list.innerHTML = '';
  if (links.length === 0) {
    list.innerHTML = '<div class="empty-hint">還沒有連結</div>';
    return;
  }
  links.forEach(function(l, i) {
    var item = document.createElement('div');
    item.className = 'link-item';

    var a = document.createElement('a');
    a.href = l.url; a.target = '_blank'; a.rel = 'noopener'; a.textContent = l.name || l.url;

    var urlSpan = document.createElement('span');
    urlSpan.className = 'link-url-text'; urlSpan.textContent = l.url;

    var btn = document.createElement('button');
    btn.className = 'btn-del'; btn.textContent = '✕';
    (function(idx) { btn.addEventListener('click', function() {
      links.splice(idx, 1); saveLinks(links); renderLinks();
    }); })(i);

    var editBtn = document.createElement('button');
    editBtn.className = 'btn-edit'; editBtn.title = '編輯';
    editBtn.textContent = '✏';
    (function(idx, item) {
      editBtn.addEventListener('click', function() {
        var l = links[idx];
        item.className = 'link-item todo-editing';
        item.innerHTML = '';
        var nameIn = document.createElement('input');
        nameIn.type = 'text'; nameIn.value = l.name === l.url ? '' : (l.name || '');
        nameIn.className = 'todo-edit-text'; nameIn.placeholder = '顯示名稱（可留空）';
        var urlIn = document.createElement('input');
        urlIn.type = 'text'; urlIn.value = l.url;
        urlIn.className = 'todo-edit-text'; urlIn.placeholder = '網址 https://...';
        var saveBtn = document.createElement('button');
        saveBtn.className = 'btn-add'; saveBtn.textContent = '儲存';
        saveBtn.addEventListener('click', function() {
          var newUrl = urlIn.value.trim();
          if (!newUrl) { alert('網址不能為空'); return; }
          if (newUrl.indexOf('://') < 0) newUrl = 'https://' + newUrl;
          var newName = nameIn.value.trim();
          links[idx].name = newName || newUrl;
          links[idx].url = newUrl;
          saveLinks(links); renderLinks();
        });
        var cancelBtn = document.createElement('button');
        cancelBtn.className = 'btn-del'; cancelBtn.textContent = '✕';
        cancelBtn.addEventListener('click', function() { renderLinks(); });
        item.appendChild(nameIn); item.appendChild(urlIn);
        item.appendChild(saveBtn); item.appendChild(cancelBtn);
        nameIn.focus();
      });
    })(i, item);

    // ↑ / ↓ 排序按鈕
    var upBtn = document.createElement('button');
    upBtn.className = 'move-btn'; upBtn.textContent = '↑'; upBtn.title = '上移';
    upBtn.disabled = (i === 0);
    (function(idx) { upBtn.addEventListener('click', function() {
      var tmp = links[idx - 1]; links[idx - 1] = links[idx]; links[idx] = tmp;
      saveLinks(links); renderLinks();
    }); })(i);

    var downBtn = document.createElement('button');
    downBtn.className = 'move-btn'; downBtn.textContent = '↓'; downBtn.title = '下移';
    downBtn.disabled = (i === links.length - 1);
    (function(idx) { downBtn.addEventListener('click', function() {
      var tmp = links[idx + 1]; links[idx + 1] = links[idx]; links[idx] = tmp;
      saveLinks(links); renderLinks();
    }); })(i);

    item.appendChild(a); item.appendChild(urlSpan); item.appendChild(upBtn); item.appendChild(downBtn); item.appendChild(editBtn); item.appendChild(btn);
    list.appendChild(item);
  });
}
function addLink() {
  var url  = document.getElementById('link-url-in').value.trim();
  var name = document.getElementById('link-name-in').value.trim();
  if (!url) return;
  if (url.indexOf('://') < 0) url = 'https://' + url;
  var links = loadLinks();
  links.push({ name: name || url, url: url });
  saveLinks(links);
  document.getElementById('link-name-in').value = '';
  document.getElementById('link-url-in').value  = '';
  renderLinks();
}
document.getElementById('link-add').addEventListener('click', addLink);
document.getElementById('link-url-in').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') addLink();
});

// ════════════════════════════════════════════════════
// 筆記（localStorage: ccep_notes）
// 支援每個筆記卡片（key）擁有多個命名子欄位
// 資料格式：{ key: [ {id: string, name: string, text: string}, ... ] }
// ════════════════════════════════════════════════════
var S_NOTES = 'ccep_notes';

function loadNotes() {
  try { return JSON.parse(localStorage.getItem(S_NOTES) || '{}'); } catch(e) { return {}; }
}
function saveNotes(notes) {
  localStorage.setItem(S_NOTES, JSON.stringify(notes));
  markDirty();
}

// 舊格式相容：若 notes[key] 是 string，轉換為陣列格式
function getSubNotes(notes, key) {
  var val = notes[key];
  if (!val) return [];
  if (typeof val === 'string') {
    // 舊格式：自動轉換
    return val ? [{ id: 'default', name: '筆記', text: val }] : [];
  }
  if (Array.isArray(val)) return val;
  return [];
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function makeNoteCard(key, title, badge, isCurrent) {
  var notes = loadNotes();
  var card  = document.createElement('div');
  card.className = 'note-card' + (isCurrent ? ' current expanded' : '');
  card.dataset.key = key;

  var head = document.createElement('div');
  head.className = 'note-card-head';
  head.innerHTML =
    '<span class="note-card-title">' + title + '</span>' +
    (badge ? '<span class="note-card-badge">' + badge + '</span>' : '') +
    '<span class="note-card-chevron">▾</span>';
  head.addEventListener('click', function() { card.classList.toggle('expanded'); });

  var body = document.createElement('div');
  body.className = 'note-card-body';

  function renderSubNotes() {
    body.innerHTML = '';
    var subNotes = getSubNotes(loadNotes(), key);
    subNotes.forEach(function(sn, i) {
      var item = document.createElement('div');
      item.className = 'subnote-item' + (isCurrent && i === 0 ? ' expanded' : '');

      var sHead = document.createElement('div');
      sHead.className = 'subnote-head';
      sHead.innerHTML =
        '<span class="subnote-name">' + sn.name + '</span>' +
        '<button class="subnote-del" title="刪除此欄位">✕</button>' +
        '<span class="subnote-chevron">▾</span>';
      sHead.addEventListener('click', function(e) {
        if (e.target.classList.contains('subnote-del')) return;
        item.classList.toggle('expanded');
      });
      sHead.querySelector('.subnote-del').addEventListener('click', function(e) {
        e.stopPropagation();
        if (!confirm('確定刪除筆記欄位「' + sn.name + '」？')) return;
        var n = loadNotes();
        var arr = getSubNotes(n, key);
        arr = arr.filter(function(x) { return x.id !== sn.id; });
        n[key] = arr;
        saveNotes(n);
        renderSubNotes();
      });

      var sBody = document.createElement('div');
      sBody.className = 'subnote-body';
      var ta = document.createElement('textarea');
      ta.className = 'note-area';
      ta.placeholder = '在這裡輸入筆記...';
      ta.value = sn.text || '';
      ta.addEventListener('input', function() {
        var n = loadNotes();
        var arr = getSubNotes(n, key);
        for (var j = 0; j < arr.length; j++) {
          if (arr[j].id === sn.id) { arr[j].text = ta.value; break; }
        }
        n[key] = arr;
        saveNotes(n);
      });
      sBody.appendChild(ta);

      item.appendChild(sHead);
      item.appendChild(sBody);
      body.appendChild(item);
    });

    // 新增欄位按鈕
    var addBtn = document.createElement('button');
    addBtn.className = 'add-subnote-btn';
    addBtn.textContent = '+ 新增筆記欄位';
    addBtn.addEventListener('click', function() {
      var name = prompt('筆記欄位名稱：');
      if (!name || !name.trim()) return;
      var n = loadNotes();
      var arr = getSubNotes(n, key);
      arr.push({ id: uid(), name: name.trim(), text: '' });
      n[key] = arr;
      saveNotes(n);
      renderSubNotes();
      // 展開新欄位
      var items = body.querySelectorAll('.subnote-item');
      if (items.length > 0) items[items.length - 1].classList.add('expanded');
    });
    body.appendChild(addBtn);
  }

  renderSubNotes();

  card.appendChild(head);
  card.appendChild(body);
  return card;
}

function renderNotes() {
  var week = currentWeekNum();
  var grid = document.getElementById('notes-grid');
  grid.innerHTML = '';

  var weekLbl = document.createElement('div');
  weekLbl.className = 'notes-section-label';
  weekLbl.textContent = '週次 Meeting 筆記';
  grid.appendChild(weekLbl);

  MEETINGS.forEach(function(m) {
    var isCurrent = (m.week === week);
    var card = makeNoteCard(
      m.key,
      m.label + '（第' + m.week + '週）',
      isCurrent ? '本週' : '',
      isCurrent
    );
    grid.appendChild(card);
  });

  var msLbl = document.createElement('div');
  msLbl.className = 'notes-section-label';
  msLbl.textContent = '月報告 ＆ 期末成果';
  grid.appendChild(msLbl);

  MILESTONE_NOTES.forEach(function(m) {
    grid.appendChild(makeNoteCard(m.key, m.label, '', false));
  });
}

(function checkPassword() {
  if (location.protocol === 'file:') return;
  if (sessionStorage.getItem('ccep_auth') === '1') return;
  var riddles = [
    '什麼東西完全沒有重量，但即使是世界上最強壯的人，也無法憋氣提著它超過幾分鐘？',
    '一個高大的男人走在傾盆大雨中，他沒有雨傘，也沒有戴帽子，全身上下的衣服都濕透了，但他的頭髮一根都沒有濕。為什麼？',
    '什麼數字，如果你把它倒過來放，它的數值會立刻增加一半？',
    '它就在你面前，你看得見它，卻摸不著它；你可以穿過它，它卻永遠跟著你走。它是什麼？',
    '一場馬拉松比賽中，你奮力衝刺，終於超越了第二名，請問你現在是第幾名？',
    '製造它的人不需要它，買它的人不使用它，使用它的人卻完全不知道自己在用它。它是什麼？',
    '什麼東西，你只要一說出它的名字，就會立刻把它打破？',
    '什麼東西，你每抽一口，它就會變短一點？',
    '它是黑色的，但被弄髒（使用過）後會變成白色，擦乾淨後又變回原來的黑色。它是什麼？',
    '它有手卻沒有手臂，有臉卻沒有眼睛，它跑得很快卻永遠留在原地。它是什麼？'
  ];
  var q = riddles[Math.floor(Math.random() * riddles.length)];
  var input = prompt(q);
  if (input === '932266') {
    sessionStorage.setItem('ccep_auth', '1');
  } else {
    document.body.innerHTML = '<div style="text-align:center;padding:80px;font-family:sans-serif;color:#0969da;font-size:22px;font-weight:700;">要不要打羽毛球</div>';
    throw new Error('auth failed');
  }
})();
